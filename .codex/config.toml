# Codex CLI — project configuration for Enlisted.
#
# Precedence (highest wins):
#   CLI flags > profile > this file > %USERPROFILE%\.codex\config.toml > defaults
#
# Codex will prompt to "trust" this project the first time it reads this file.
# Personal overrides belong in AGENTS.override.md (gitignored), not here.

# Ask before running commands that write outside the workspace or need network.
approval_policy = "on-request"

# Allow edits inside the repo without prompting for every write.
sandbox_mode = "workspace-write"

# On Windows the unelevated sandbox avoids admin prompts and the "Error 1385"
# logon-policy issue some machines hit with the elevated sandbox.
[windows]
sandbox = "unelevated"
